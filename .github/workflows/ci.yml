name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test against amc ${{ matrix.amc-tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        amc-tag: [v0.8.48]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgc-dev libssl-dev libcurl4-openssl-dev libnghttp2-dev

      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"
          VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p $RUNNER_TEMP/amc-install
          tar -xzf amc.tar.gz -C $RUNNER_TEMP/amc-install --strip-components=1
          echo "AMC=$RUNNER_TEMP/amc-install/bin/amc" >> $GITHUB_ENV
          echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/share/amalgame/runtime" >> $GITHUB_ENV

      - name: Install package deps (amalgame-web, amalgame-net-http)
        run: |
          # v0.6.0: Mosaic now exercises amalgame-web's Static
          # middleware (v0.13.0+) via public/ auto-pairing.
          #
          # Known amc bug: web's transitive auto-install fails on
          # `amalgame-database-nosql-redis` because the index alias
          # is `redis` and amc's shortname resolution doesn't
          # check the cache for already-installed full names.
          # Workaround: pre-install redis (under its index
          # shortname) + manually clone web into the package cache
          # using the same `<tag>_<short-sha>` layout amc expects.
          # The test runner discovers cached versions via
          # `find ~/.amalgame/packages/...` so this is enough.
          "$AMC" package add redis
          "$AMC" package add net-http
          "$AMC" package add tls
          "$AMC" package add crypto
          "$AMC" package add datetime
          "$AMC" package add random
          "$AMC" package add logging
          "$AMC" package add async

          # Clone amalgame-web v0.13.0 straight into the cache layout
          # amc expects, bypassing the broken transitive resolve.
          WEB_TAG="v0.13.0"
          WEB_SHA=$(git ls-remote https://github.com/amalgame-lang/amalgame-web.git "refs/tags/${WEB_TAG}" | cut -c1-8)
          WEB_CACHE="$HOME/.amalgame/packages/github.com/amalgame-lang/amalgame-web/${WEB_TAG}_${WEB_SHA}"
          mkdir -p "$(dirname "$WEB_CACHE")"
          git clone --quiet --depth 1 --branch "$WEB_TAG" \
            https://github.com/amalgame-lang/amalgame-web.git "$WEB_CACHE"
          echo "Cached amalgame-web $WEB_TAG at $WEB_CACHE"

      - name: Run mosaic smoke tests
        run: ./tests/run_tests.sh "$AMC"
