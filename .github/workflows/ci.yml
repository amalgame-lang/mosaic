name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test against amc ${{ matrix.amc-tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        amc-tag: [v0.8.34]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgc-dev libssl-dev libcurl4-openssl-dev libnghttp2-dev

      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"
          VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p $RUNNER_TEMP/amc-install
          tar -xzf amc.tar.gz -C $RUNNER_TEMP/amc-install --strip-components=1
          echo "AMC=$RUNNER_TEMP/amc-install/bin/amc" >> $GITHUB_ENV
          echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/share/amalgame/runtime" >> $GITHUB_ENV

      - name: Install package deps (amalgame-web, amalgame-net-http)
        run: |
          "$AMC" package add web@v0.2.1     # bumped after the tools/ move
          "$AMC" package add net-http@v0.2.0

      - name: Run mosaic smoke tests
        run: ./tests/run_tests.sh "$AMC"
