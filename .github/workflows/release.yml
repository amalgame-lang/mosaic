name: Release

# Builds the Mosaic CLI artifact (bash scripts + compiled
# `mosaic-supervise`) for each supported platform and publishes
# them as GitHub Release assets.  Same shape as amc's release.yml
# â€” `install.sh` downloads the pre-built tarball that matches the
# host triple instead of compiling from source.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the workflow without cutting a real release
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.5.0)'
        required: true
        default: 'v0.0.0-test'

jobs:
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Each platform stages the same layout under dist/mosaic/:
  #     bin/         â€” mosaic dispatcher + shell scripts + mosaic-supervise
  #     share/mosaic â€” livereload-daemon.am + .toml, docs/
  # then tars it up as mosaic-<ver>-<triple>.tar.gz.
  # The final job downloads all three artifacts and creates the
  # GitHub Release.
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  build-linux:
    name: Build (Linux x86_64)
    # ubuntu-24.04 (not 22.04): the mosaic-serve binary pulls
    # amalgame-async/threading via amalgame-web, whose generated C
    # links GC_set_stackbottom / GC_get_my_stackbottom (per-thread GC
    # stack registration). Those need libgc >= 7.6; the apt libgc on
    # 22.04 is too old and the link fails. 24.04's libgc has them â€”
    # it's the baseline the whole Amalgame web stack (async/net-http)
    # already tests on.
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ver=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build mosaic-supervise
        run: |
          gcc -O2 -Wall tools/mosaic-supervise.c -o tools/mosaic-supervise
          file tools/mosaic-supervise

      # The config-driven server binary (`mosaic serve`). Build it from
      # src/mosaic-serve.am against the published Mosaic stack so the
      # release ships a zero-amc binary. Needs amc >= v0.8.74 (the
      # deep-member-chain cgen fix; earlier amc mis-lowered the
      # this.field.field.method() chains in the tls/web facades and
      # failed to resolve sibling classes). Verified in a fresh env with
      # the exact v0.8.74 release tarball: package add web/net-http/tls
      # â†’ amc build â†’ a 300KB multi-site server binary.
      - name: Build mosaic-serve (config-driven server)
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libgc-dev libssl-dev libnghttp2-dev
          AMC_TAG=v0.8.74
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${AMC_TAG}/amc-${AMC_TAG#v}-linux-x86_64.tar.gz"
          mkdir -p "$HOME/amc" && tar -xzf amc.tar.gz -C "$HOME/amc" --strip-components=1
          export PATH="$HOME/amc/bin:$PATH"
          amc --version
          # Fail fast + clearly if the runner's libgc lacks the
          # per-thread stack-bottom API the threaded stack needs.
          cat > /tmp/gcprobe.c <<'EOF'
          #include <gc.h>
          int main(void){ struct GC_stack_base sb; GC_get_my_stackbottom(&sb); GC_set_stackbottom((void*)0,&sb); return 0; }
          EOF
          gcc /tmp/gcprobe.c -lgc -o /tmp/gcprobe || { echo "libgc too old (need >=7.6 for GC_set_stackbottom)"; exit 1; }
          # service@v0.2.0 (not the index's latest v0.1.0): v0.2.0 is the
          # first cut with RunAsService + the native Windows SCM dispatcher
          # that `mosaic service` (sc create) relies on. Pinned because no
          # GitHub release object exists for v0.2.0 yet, so the unpinned
          # shortname still resolves to v0.1.0 via the index.
          ( cd src && amc package add web net-http tls net-proxy service@v0.2.0 && amc build mosaic-serve.am -o mosaic-serve )
          file src/mosaic-serve

      - name: Stage release artifacts
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          STAGE="dist/mosaic-${VER}-linux-x86_64"
          mkdir -p "$STAGE/bin" "$STAGE/share/mosaic"
          install -m 755 tools/mosaic                tools/mosaic-routes.sh \
                         tools/mosaic-build.sh       tools/mosaic-dev.sh \
                         tools/mosaic-new.sh         tools/mosaic-serve.sh \
                         tools/mosaic-service.sh     tools/mosaic-supervise \
                         src/mosaic-serve \
                         "$STAGE/bin/"
          install -m 644 tools/livereload-daemon.am  \
                         tools/livereload-daemon.toml \
                         src/mosaic-serve.am          \
                         examples/mosaic.toml         \
                         "$STAGE/share/mosaic/"
          install -m 644 README.md LICENSE           "$STAGE/share/mosaic/"
          cp -R docs                                 "$STAGE/share/mosaic/docs"
          ( cd dist && tar -czf "mosaic-${VER}-linux-x86_64.tar.gz" "mosaic-${VER}-linux-x86_64" )
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86_64
          path: dist/mosaic-*-linux-x86_64.tar.gz
          retention-days: 7

  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ver=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build mosaic-supervise
        run: |
          cc -O2 -Wall tools/mosaic-supervise.c -o tools/mosaic-supervise
          file tools/mosaic-supervise

      - name: Stage release artifacts
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          STAGE="dist/mosaic-${VER}-macos-arm64"
          mkdir -p "$STAGE/bin" "$STAGE/share/mosaic"
          # macOS BSD install(1) takes one source at a time when -m is set;
          # loop to stay portable instead of relying on GNU coreutils.
          for f in tools/mosaic tools/mosaic-routes.sh tools/mosaic-build.sh \
                   tools/mosaic-dev.sh tools/mosaic-new.sh tools/mosaic-serve.sh \
                   tools/mosaic-service.sh tools/mosaic-supervise; do
              install -m 755 "$f" "$STAGE/bin/"
          done
          for f in tools/livereload-daemon.am tools/livereload-daemon.toml \
                   src/mosaic-serve.am examples/mosaic.toml \
                   README.md LICENSE; do
              install -m 644 "$f" "$STAGE/share/mosaic/"
          done
          cp -R docs "$STAGE/share/mosaic/docs"
          ( cd dist && tar -czf "mosaic-${VER}-macos-arm64.tar.gz" "mosaic-${VER}-macos-arm64" )
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: dist/mosaic-*-macos-arm64.tar.gz
          retention-days: 7

  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            zip

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ver=${TAG#v}" >> $GITHUB_OUTPUT

      # mosaic-supervise.c uses POSIX fork() + waitpid() + sys/wait.h
      # â€” none of which exist on Windows.  The supervisor would need
      # a CreateProcess-based rewrite to run natively; for now the
      # Windows release ships ONLY the bash scripts.  Users who want
      # `mosaic supervise` on Windows run via WSL2 + the Linux tarball,
      # same as nginx / haproxy / postfix.

      - name: Stage release artifacts
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          STAGE="dist/mosaic-${VER}-windows-x86_64"
          mkdir -p "$STAGE/bin" "$STAGE/share/mosaic"
          # Bash scripts â€” need Git Bash or WSL at runtime.
          for f in tools/mosaic tools/mosaic-routes.sh tools/mosaic-build.sh \
                   tools/mosaic-dev.sh tools/mosaic-new.sh tools/mosaic-serve.sh \
                   tools/mosaic-service.sh; do
              install -m 755 "$f" "$STAGE/bin/"
          done
          for f in tools/livereload-daemon.am tools/livereload-daemon.toml \
                   src/mosaic-serve.am examples/mosaic.toml \
                   README.md LICENSE; do
              install -m 644 "$f" "$STAGE/share/mosaic/"
          done
          cp -R docs "$STAGE/share/mosaic/docs"
          ( cd dist && zip -qr "mosaic-${VER}-windows-x86_64.zip" "mosaic-${VER}-windows-x86_64" )
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: dist/mosaic-*-windows-x86_64.zip
          retention-days: 7

  # Inno Setup .exe installer â€” runs natively on windows-latest so
  # the preinstalled ISCC.exe is on PATH.  Drops everything under
  # %ProgramFiles%\Mosaic\bin and adds it to PATH.  The .iss script
  # shows a heads-up about the bash-shell requirement at the end.
  build-windows-installer:
    name: Build Windows .exe installer
    runs-on: windows-latest
    needs: build-windows
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          $ver = $tag -replace '^v',''
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building installer for mosaic-$ver"

      - name: Download Windows zip artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x86_64
          path: dist/

      - name: Extract zip into staging tree
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist/*.zip | Select-Object -First 1
          Expand-Archive $zip.FullName -DestinationPath dist
          Get-ChildItem dist -Directory

      - name: Locate Inno Setup
        id: iscc
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "ISCC.exe not on runner; installing via Chocolatey..."
            choco install innosetup -y --no-progress
            $iscc = (Get-Item "C:\Program Files (x86)\Inno Setup 6\ISCC.exe").FullName
          }
          Write-Host "Using $iscc"
          "path=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run ISCC.exe
        shell: pwsh
        working-directory: install\windows
        run: |
          $ver  = "${{ steps.ver.outputs.ver }}"
          $stage = "..\..\dist\mosaic-$ver-windows-x86_64"
          & "${{ steps.iscc.outputs.path }}" `
              "/DMosaicVersion=$ver" `
              "/DMosaicStageDir=$stage" `
              mosaic.iss
          Get-ChildItem Output

      - name: Stage installer artifact
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.ver }}"
          Copy-Item "install\windows\Output\mosaic-$ver-setup.exe" `
                    "dist\mosaic-$ver-setup.exe"
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: dist/mosaic-*-setup.exe
          retention-days: 7

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Publish â€” collect the per-platform tarballs + checksum file
  # and create the GitHub Release.
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-linux, build-macos, build-windows, build-windows-installer]
    permissions:
      contents: write   # required by softprops/action-gh-release
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ver=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x86_64
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: dist/

      - name: Download Windows zip artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x86_64
          path: dist/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-installer
          path: dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum mosaic-*.tar.gz mosaic-*.zip mosaic-*-setup.exe | tee checksums.sha256
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Mosaic ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/mosaic-*-linux-x86_64.tar.gz
            dist/mosaic-*-macos-arm64.tar.gz
            dist/mosaic-*-windows-x86_64.zip
            dist/mosaic-*-setup.exe
            dist/checksums.sha256
