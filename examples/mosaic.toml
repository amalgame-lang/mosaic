# mosaic.toml — example config for `mosaic serve`.
#
# Run the whole stack from this file, no Amalgame code:
#   mosaic serve mosaic.toml
#
# Full reference: https://docs.amalgame.me/en/mosaic/03-configuration.html

[server]
port = 443
tls  = true

[tls]
acme     = true
email    = "admin@example.com"
cert_dir = "/var/mosaic/certs"

# One [[site]] per virtual host. `hosts` = the domains served; `root` =
# the directory of static files (assets by MIME, / → index.html,
# /<slug> → <slug>.html).
[[site]]
hosts = ["example.com", "www.example.com"]
root  = "/srv/example/public"

  # Per-site middleware — each table maps to a FromMap factory.
  [site.security.headers]
  preset = "strict_html"

  [site.security.cors]
  preset          = "strict"
  allowed_origins = ["https://app.example.com"]

  [site.logging]
  access_log = true
  level      = "info"

[[site]]
hosts = ["docs.example.com"]
root  = "/srv/docs/public"

  [site.security.headers]
  preset = "strict_html"

# One [[proxy]] per reverse-proxied virtual host. Requests to `hosts` are
# forwarded to upstream(s) by path prefix (longest match wins). Each
# proxy host joins the TLS/SNI/ACME set just like a [[site]].
# Each route is a single-line inline table (TOML inline tables can't span
# lines); the array itself may wrap. First match by longest prefix wins.
[[proxy]]
hosts  = ["api.example.com"]
routes = [
  { prefix = "/", upstream = "http://127.0.0.1:8080" },
  { prefix = "/heavy", upstreams = ["http://127.0.0.1:9001", "http://127.0.0.1:9002"], strategy = "round_robin" },
]

# Shorthand — a single upstream, no `routes` table:
[[proxy]]
hosts    = ["app.example.com"]
upstream = "http://127.0.0.1:3000"
